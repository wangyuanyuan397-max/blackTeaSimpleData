# A0：完整 EfficientNetV2-S 最终特征作为第一轮对照。
name: full_effv2s_ce
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_stage_probe
    pretrained: true
    output_stage: 6
    trainable_stages: [1, 2, 3, 4, 5, 6]
  head:
    type: linear
    drop_rate: 0.0
loss:
  type: cross_entropy
  label_smoothing: 0.0
