# B1：只把 Stage5 的普通四分类建模替换为 CORAL 三边界建模。
name: stage5_coral
model:
  type: classifier
  strategy: ordinal_regression
  backbone:
    type: efficientnet_v2_s_stage_probe
    pretrained: true
    output_stage: 5
    trainable_stages: [1, 2, 3, 4, 5]
  head:
    type: coral_head
    drop_rate: 0.0
    threshold: 0.5
loss:
  type: coral_ordinal
  num_classes: 4
