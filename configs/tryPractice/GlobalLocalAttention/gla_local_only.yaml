# GLA-B：只使用 spatial-softmax local pooling，判断局部特征本身是否有效。
name: gla_local_only
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_region_attention
    pretrained: true
    pooling_mode: local
    reduction: 8
    temperature: 1.0
    local_scale_init: 0.0
  head:
    type: linear
    drop_rate: 0.2
loss:
  type: cross_entropy
  label_smoothing: 0.0
