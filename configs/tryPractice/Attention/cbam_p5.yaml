name: cbam_p5
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_stage_attention
    pretrained: true
    num_classes: 4
    attention_type: cbam
    attention_positions: [5]
    cbam_reduction: 16
    cbam_spatial_kernel_size: 7
    final_dropout: 0.2
  head:
    type: identity
    drop_rate: 0.0
