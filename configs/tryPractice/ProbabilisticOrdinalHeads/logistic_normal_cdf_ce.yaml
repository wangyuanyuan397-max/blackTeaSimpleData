name: logistic_normal_cdf_ce
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_probabilistic_ordinal
    pretrained: true
    num_classes: 4
    distribution: logistic_normal
    use_ce_head: false
    final_dropout: 0.2
    num_grid: 200
    min_concentration: 1
    max_concentration: 80.0
    min_sigma: 0.05
    max_sigma: 5.0
  head:
    type: identity
    drop_rate: 0.0
loss:
  type: probabilistic_ordinal
  mode: logistic_normal_cdf
  use_ce: false
  auxiliary_weight: 1
  beta_reg_weight: 0.0001
