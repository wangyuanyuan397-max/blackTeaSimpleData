name: ce_kuma_cdf_aux_lam0.3
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_probabilistic_ordinal
    pretrained: true
    num_classes: 4
    distribution: kumaraswamy
    use_ce_head: true
    final_dropout: 0.2
    num_grid: 200
    min_concentration: 1
    max_concentration: 80.0
    min_sigma: 0.05
    max_sigma: 5.0
  head:
    type: identity
    drop_rate: 0.0
loss:
  type: probabilistic_ordinal
  mode: kumaraswamy_cdf
  use_ce: true
  auxiliary_weight: 0.3
  beta_reg_weight: 0.0001
