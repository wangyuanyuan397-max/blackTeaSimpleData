# GLMS-2：拼接全局特征 g 与局部多尺度特征 l。
name: glms_concat_fusion
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_global_local_multiscale
    pretrained: true
    fusion_mode: concat
    local_channels: 256
    gate_hidden_dim: 128
  head:
    type: linear
    drop_rate: 0.2
loss:
  type: cross_entropy
  label_smoothing: 0.0
