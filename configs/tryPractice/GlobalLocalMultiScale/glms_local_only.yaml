# GLMS-1：只使用 3×3、5×5、7×7 深度卷积提取的局部多尺度特征。
name: glms_local_only
model:
  type: classifier
  strategy: classification
  backbone:
    type: efficientnet_v2_s_global_local_multiscale
    pretrained: true
    fusion_mode: local
    local_channels: 256
    gate_hidden_dim: 128
  head:
    type: linear
    drop_rate: 0.2
loss:
  type: cross_entropy
  label_smoothing: 0.0
