# ======================================================================
# MobileNetV3-Large + strict CE baseline (Full 6-fold LOGOCV, b16a2)
# Train: random crop
# Test: sliding window + vote
# ======================================================================

random_seed: 2026
disable_adaptive_script: true

use_wandb: true
enable_google_drive_upload: true

data:
  train_transform:
    type: "tea_train_512"
    image_size: 512
  eval_transform:
    type: "tea_test_sliding_window_512"
    window_size: 512
    stride: 256

model:
  type: "classifier"
  strategy: "classification"
  backbone:
    type: "torchvision"
    model_name: "mobilenet_v3_large"
    pretrained: true
  head:
    type: "linear"
    drop_rate: 0.0

loss:
  type: "cross_entropy"
  label_smoothing: 0.0

optimizer:
  type: "adamw"
  lr: 0.00005
  weight_decay: 0.0005

scheduler:
  type: "cosine"
  warmup_epochs: 3
  min_lr: 0.000001

train:
  epochs: 150
  batch_size: 16
  accumulation_steps: 2
  eval_batch_size: 4
  val_batch_size: 4
  test_batch_size: 4
  selection_metric: "val_acc"
  selection_mode: "max"
  selection_min_delta: 0.0
  tta_mode: "vote"
  tta_topk: 20
  tta_compare: true
  tta_compare_modes: ["vote", "topk"]
  num_workers: 0
  weighted_sampler: false
  patience: 30

logocv:
  folds: [1, 2, 3, 4, 5, 6]
  resume: false
